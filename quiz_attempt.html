{% extends 'core/base.html' %}
{% block content %}
<div class="card shadow-sm p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Question {{ question_number }} of {{ total_questions }}</h4>
    <div class="alert alert-warning mb-0 py-2 px-3" id="timer-box" style="font-size: 18px;">
      ⏳ Time Left: <span id="timer">30</span>s
    </div>
  </div>

  <p class="lead">{{ question.text }}</p>

  <form method="post" id="quiz-form">
    {% csrf_token %}
    {% for option in options %}
      <div class="form-check mb-2">
        <input class="form-check-input" type="radio" name="option" id="option{{ option.id }}" value="{{ option.id }}">
        <label class="form-check-label" for="option{{ option.id }}">
          {{ option.text }}
        </label>
      </div>
    {% endfor %}
    <hr>
    <button type="submit" class="btn btn-primary mt-3">Submit Answer</button>
  </form>
</div>

<script>
let timeLeft = 30; // total seconds per question (adjust if needed)
const timer = document.getElementById('timer');
const quizForm = document.getElementById('quiz-form');

function updateTimer() {
  timer.innerText = timeLeft;
  if (timeLeft <= 0) {
    clearInterval(countdown);
    alert("⏰ Time's up! Submitting your answer...");
    quizForm.submit();
  }
  timeLeft--;
}

let countdown = setInterval(updateTimer, 1000);
</script>
{% endblock %}
